<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoctorChamber Professional Design</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
  
    <style>
        body { cursor: none !important; margin: 0; min-height: 100vh; transition: background-color 0.4s ease; }
       
        /* ডার্ক মোড - গাঢ় নীল কিন্তু খুব বেশি কালো নয় */
.dark body {
    background-color: #0f172a !important; /* হালকা ডার্ক ব্লু */
    color: #f1f5f9 !important; /* হালকা টেক্সট */
}
 
    
    /* মোবাইল ডিভাইসের জন্য প্যাডিং অ্যাডজাস্টমেন্ট */
    @media (max-width: 768px) {
        body {
            padding-top: 20px;
        }
    }
    .cursor-ring {
    position: fixed;
    border: 2px solid #fbbf24; /* Amber-400 */
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
   
    transition: transform 0.1s ease;
    transform: translate(-50%, -50%);
}

    </style>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    
</head>
<body class="bg-white dark:bg-[#030821] text-gray-900 dark:text-white transition-colors duration-300">

    <!-- Header Section -->
    <header class="fixed top-4 inset-x-4 z-50">
        <div class="max-w-[1200px] mx-auto bg-[#08164bd8] border border-blue-800 rounded-[30px] shadow-2xl backdrop-blur-md px-6 py-4">
            <div class="flex items-center justify-between gap-6 mb-4">
                <a href="#" class="flex items-center text-white text-lg font-black tracking-tighter">doctor<span class="text-amber-400">chamber</span></a>
                <div class="flex items-center gap-4">
                    <button id="themeToggle" class="text-amber-400 hover:rotate-90 transition-transform"><i class="fa-solid fa-gear"></i></button>
                    <button id="mobileMenuBtn" class="lg:hidden text-white text-xl"><i class="fa-solid fa-bars"></i></button>
                </div>
            </div>
            <nav class="border-t border-blue-800 pt-4 flex items-center gap-8 text-white font-bold text-xs uppercase">
                <a href="index.html" class="hover:text-amber-400">Home</a>
                <a href="resources.html" class="hover:text-amber-400">Resources</a>
                <a href="contact.html" class="hover:text-amber-400">Contact Us</a>
            </nav>
        </div>
    </header>

    <!-- Mobile Menu -->
    <div id="mobileMenu" class="hidden lg:hidden fixed top-24 left-4 right-4 bg-[#050f33] border border-blue-900 p-6 rounded-2xl z-50 text-white shadow-2xl">
        <a href="index.html" class="block py-2">Home</a>
        <a href="resources.html" class="block py-2">Resources</a>
    </div>

    <!-- Main Content -->
    <main class="py-24 px-4">
        <div class="max-w-[1100px] mx-auto">
            <div class="text-center mb-16">
                <h1 class="text-4xl font-bold mb-4">Resources & Insights</h1>
                <p class="text-blue-200">Expert medical advice and wellness guides.</p>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div class="bg-gray-100 dark:bg-[#0a1540] p-8 rounded-2xl border border-gray-300 dark:border-blue-800 shadow-lg">
                    <h3 class="text-xl font-bold mb-3">Patient Health Guide</h3>
                    <p class="text-sm">Learn how to manage your health records.</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-[#030821] pt-16 pb-8 px-6 text-white border-t border-blue-900">
        <div class="max-w-[1200px] mx-auto text-center">
            <p>&copy; 2026 DoctorChamber. Powered by UpToTechSyl Digital Agency</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script>
        document.getElementById('themeToggle').addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
        });
        document.getElementById('mobileMenuBtn').addEventListener('click', () => {
            document.getElementById('mobileMenu').classList.toggle('hidden');
        });
        const rings = [];
        for (let i = 0; i < 6; i++) {
            const div = document.createElement('div');
            div.className = 'cursor-ring';
            div.style.width = (50 - i * 6) + 'px';
            div.style.height = (50 - i * 6) + 'px';
            document.body.appendChild(div);
            rings.push(div);
        }
        document.addEventListener('mousemove', (e) => {
            rings.forEach((ring, index) => {
                setTimeout(() => {
                    ring.style.left = e.clientX + 'px';
                    ring.style.top = e.clientY + 'px';
                }, index * 20);
            });
        });
    </script>
</body>
</html>
